name: Spec Validate

on:
  pull_request:
    paths:
      - 'spec/**'
      - 'packages/core/schema/**'
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - 'packages/core/schema/**'

permissions:
  contents: read

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate spec fixtures
        run: node scripts/validate-examples.mjs
